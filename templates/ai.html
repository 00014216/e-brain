{% extends 'base.html' %}
{% block title %}AI Chat — e-brain{% endblock %}

{% block content %}
<style>
  .chat-layout {
    display: flex;
    height: calc(100vh - 100px);
    gap: 20px;
  }

  .chat-sidebar {
    width: 260px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    padding: 15px;
    gap: 10px;
    overflow-y: auto;
  }

  .chat-sidebar h3 {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text3);
    margin-bottom: 10px;
  }

  .conv-item {
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    color: var(--text2);
    background: transparent;
    transition: all var(--t);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: 13px;
    font-weight: 500;
    text-align: left;
    border: none;
    width: 100%;
  }

  .conv-item:hover,
  .conv-item.active {
    background: var(--bg3);
    color: var(--text);
  }

  .btn-new-chat {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    padding: 10px;
    cursor: pointer;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-weight: 600;
    font-size: 14px;
    transition: all var(--t);
    box-shadow: 0 4px 14px rgba(124, 58, 237, 0.35);
  }

  .btn-new-chat:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(124, 58, 237, 0.5);
  }

  .chat-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .chat-history {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .chat-bubble {
    max-width: 80%;
    padding: 16px 20px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    line-height: 1.6;
  }

  .chat-bubble.user {
    align-self: flex-end;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border-bottom-right-radius: 4px;
    box-shadow: 0 4px 14px rgba(124, 58, 237, 0.2);
  }

  .chat-bubble.assistant {
    align-self: flex-start;
    background: var(--bg3);
    color: var(--text);
    border-bottom-left-radius: 4px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
  }

  .chat-input-area {
    padding: 20px;
    background: var(--bg2);
    border-top: 1px solid var(--border);
  }

  .chat-input-area textarea {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    border-radius: var(--radius-sm);
    padding: 16px;
    resize: none;
    font-family: inherit;
    font-size: 14px;
    transition: all var(--t);
  }

  .chat-input-area textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow2);
  }

  .chat-actions {
    display: flex;
    justify-content: flex-end;
    margin-top: 12px;
  }

  .ai-memories-ref {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .ai-mem-cards {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding-bottom: 12px;
  }

  .ai-mem-card {
    min-width: 220px;
    max-width: 220px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px;
    cursor: pointer;
    transition: all var(--t);
  }

  .ai-mem-card:hover {
    transform: translateY(-2px);
    border-color: var(--border2);
    background: var(--bg3);
  }

  .ai-mem-card h4 {
    font-size: 13.5px;
    font-weight: 600;
    margin: 0 0 6px 0;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .ai-mem-card p {
    font-size: 11.5px;
    color: var(--text3);
    font-weight: 700;
    text-transform: uppercase;
    margin: 0;
  }
</style>

<div class="chat-layout">
  <div class="chat-sidebar">
    <button class="btn-new-chat" onclick="startNewChat()"><i data-lucide="plus"></i> New Chat</button>
    <h3>Recent Chats</h3>
    <div id="convList"></div>
  </div>

  <div class="chat-main">
    <div class="chat-history" id="chatHistory">
      <div class="chat-bubble assistant">
        Hi there! I am your e-brain AI. Ask me to find something you've captured or to find insights across your
        memories.
      </div>
    </div>

    <div class="chat-input-area">
      <textarea id="aiQuery" rows="2" placeholder="Ask anything about your memories... (Ctrl+Enter to send)"></textarea>
      <div class="chat-actions">
        <button id="aiSearchBtn" class="btn-primary" onclick="sendMessage()"><i data-lucide="send"></i> Send</button>
      </div>
    </div>
  </div>
</div>

{% endblock %}

{% block scripts %}
<script>
  let currentConvId = null;

  async function loadConversations() {
    const r = await fetch('/api/ai/conversations');
    if (r.ok) {
      const data = await r.json();
      const list = document.getElementById('convList');
      list.innerHTML = data.conversations.map(c =>
        `<button class="conv-item ${c.id === currentConvId ? 'active' : ''}" onclick="loadChat('${c.id}')">${c.title}</button>`
      ).join('');
    }
  }

  function startNewChat() {
    currentConvId = null;
    document.getElementById('chatHistory').innerHTML = '<div class="chat-bubble assistant">Hi there! What are you looking for?</div>';
    loadConversations();
  }

  async function loadChat(convId) {
    currentConvId = convId;
    const r = await fetch('/api/ai/conversations/' + convId);
    if (r.ok) {
      const data = await r.json();
      renderHistory(data.conversation.messages || []);
      loadConversations();
    }
  }

  function renderHistory(messages) {
    const h = document.getElementById('chatHistory');
    h.innerHTML = '';
    messages.forEach(m => {
      let html = `<div class="chat-bubble ${m.role}">${m.content.replace(/\n/g, '<br>')}</div>`;
      if (m.role === 'assistant' && m.memories && m.memories.length > 0) {
        let cards = m.memories.map(mem => `
        <div class="ai-mem-card" onclick="window.location.href='/memory/${mem.id}'">
          <h4>${mem.title || 'Untitled'}</h4>
          <p>${mem.memory_type}</p>
        </div>
      `).join('');
        html = `<div class="chat-bubble ${m.role}">
        ${m.content.replace(/\n/g, '<br>')}
        <div class="ai-memories-ref">
          <span style="font-size:12px;color:#a1a1aa;display:block;margin-bottom:8px">References:</span>
          <div class="ai-mem-cards">${cards}</div>
        </div>
      </div>`;
      }
      h.insertAdjacentHTML('beforeend', html);
    });
    h.scrollTo(0, h.scrollHeight);
    lucide.createIcons();
  }

  async function sendMessage() {
    const queryInput = document.getElementById('aiQuery');
    const query = queryInput.value.trim();
    if (!query) return;

    queryInput.value = '';

    const h = document.getElementById('chatHistory');
    h.insertAdjacentHTML('beforeend', `<div class="chat-bubble user">${query}</div>`);
    const loadingId = 'loading-' + Date.now();
    h.insertAdjacentHTML('beforeend', `<div id="${loadingId}" class="chat-bubble assistant"><i data-lucide="loader-2" class="lucide-spin"></i> Thinking...</div>`);
    h.scrollTo(0, h.scrollHeight);
    lucide.createIcons();

    const btn = document.getElementById('aiSearchBtn');
    btn.disabled = true;

    try {
      const body = { query };
      if (currentConvId) body.conversation_id = currentConvId;

      const r = await fetch('/api/ai/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await r.json();

      document.getElementById(loadingId).remove();

      if (data.error) {
        h.insertAdjacentHTML('beforeend', `<div class="chat-bubble assistant" style="color:#ef4444">${data.error}</div>`);
      } else {
        if (!currentConvId && data.conversation_id) {
          currentConvId = data.conversation_id;
        }
        renderHistory([...document.querySelectorAll('.chat-bubble')].map(node => ({
          // this is just to keep the old DOM, actually we should re-fetch or just append the new message correctly.
          role: node.classList.contains('user') ? 'user' : 'assistant',
          content: node.innerText
        })));
        // actually let's just re-render properly by fetching the whole chat.
        loadChat(currentConvId);
      }

    } catch (e) {
      document.getElementById(loadingId).remove();
      h.insertAdjacentHTML('beforeend', `<div class="chat-bubble assistant" style="color:#ef4444">Connection error.</div>`);
    }

    btn.disabled = false;
    h.scrollTo(0, h.scrollHeight);
  }

  document.getElementById('aiQuery').addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) sendMessage();
  });

  loadConversations();
</script>
{% endblock %}
